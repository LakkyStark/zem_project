services:
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    environment:
      PUBLIC_WEB_DOMAIN: ${PUBLIC_WEB_DOMAIN}
      PUBLIC_API_DOMAIN: ${PUBLIC_API_DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
      - api

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: buildlaw
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: buildlaw
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U buildlaw -d buildlaw"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    ports:
      # optional: expose console to admin (consider firewall)
      - "9001:9001"

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint:
      - /bin/sh
      - -c
      - |
        sleep 2
        mc alias set local http://minio:9000 minioadmin "${MINIO_ROOT_PASSWORD}"
        mc mb local/${S3_BUCKET_NAME} --ignore-existing || true
        exit 0

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg2://buildlaw:${POSTGRES_PASSWORD}@postgres:5432/buildlaw
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      API_V1_PREFIX: /v1
      # CORS: set to your web domain
      CORS_ALLOW_ORIGINS: ["https://${PUBLIC_WEB_DOMAIN}"]
      # MinIO (S3-compatible)
      S3_ENDPOINT_URL: http://minio:9000
      # public endpoint for presigned URLs (should match external reachability)
      S3_PUBLIC_ENDPOINT_URL: https://${PUBLIC_API_DOMAIN}
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME}
      S3_REGION: us-east-1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

  worker:
    build:
      context: ./apps/worker
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://buildlaw:${POSTGRES_PASSWORD}@postgres:5432/buildlaw
      REDIS_URL: redis://redis:6379/0
      LOG_LEVEL: INFO
      S3_ENDPOINT_URL: http://minio:9000
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME}
      S3_REGION: us-east-1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: https://${PUBLIC_API_DOMAIN}
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
  minio_data:
  caddy_data:
  caddy_config:

